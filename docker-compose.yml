version: '3.8'

services:
  db:
    image: postgres:15
    container_name: olist_postgres_container
    restart: always 
    
    # Lee las variables del archivo .env
    env_file:
      - .env
      
    ports:
      - "5432:5432"
      
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres_data: {}